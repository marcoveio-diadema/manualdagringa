{% extends "base.html" %}
{% from "bootstrap5/form.html" import render_form %}
{% block title %}Sobre Nós{% endblock%}

{% block content %}
<!-- Page Header-->
<header
  class="masthead faqs-header"
  style="background-image: url('../static/assets/img/poonhill.jpeg')"
>
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="site-heading">
          <h1 class="features-text">Perguntas Frequentes</h1>
          <span class="subheading features-text">Guia rapido de perguntas e respostas.</span>
        </div>
      </div>
    </div>
  </div>
</header>



<section class="section-faqs py-5">
    <main class="mb-4">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 text-center">
                    <hr>
                    {% for question in questions %}
                    <div class="accordion" id="accordionExample">
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ question.id }}" aria-expanded="true" aria-controls="collapse{{ question.id }}">
                                {{ question.question }}
                            </button>
                            </h2>
                            <div id="collapse{{ question.id }}" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                                <div class="accordion-body">
                                    <span>{{ question.answer }}</span>
                                </div>
                            </div>
                        </div>      
                    </div>
                    {% endfor %} 
                </div>
            </div>
        </div>
    </main>
</section>

{% endblock%}
