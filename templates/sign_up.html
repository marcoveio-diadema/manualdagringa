{% from "bootstrap5/form.html" import render_form %}
{% include "header.html" %}

<!-- Page Header -->
<header class="masthead" style="background-image: url('../static/assets/img/GOPR1432.jpg')">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <h1 class="post-heading">Inscreva-se</h1>
          <span class="subheading post-heading">Contribua com a nossa comunidade!</span>
          
        </div>
      </div>
    </div>
  </div>
</header>

<section class="section-register py-5">
    <main class="mb-4">
      <div class="container">
        <div class="row">
          <div class="col-lg-8 col-md-10 mx-auto">
            <!-- RENDER SIGN UP FORM AND SUBMIT BUTTON -->
               {{ render_form(form, novalidate=True, button_map={"submit": "primary"}) }}
          </div>
        </div>
      </div>
    </main>

</section>
