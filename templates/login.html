{% include "header.html" %}

<!-- Page Header -->
<header
  class="masthead"
  style="background-image: url('../static/assets/img/thaiblog.jpg')"
>
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <h1 class="post-heading">Entrar</h1>
          
          <span class="post-heading">Bem vindo de volta!</span>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- SECTION LOG IN -->

<section class="section-login py-5">
    <main class="mb-4">
      <div class="container">
        <div class="row">
          {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                            <p class="flash">{{ message }}</p>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
          <div class="col-lg-8 col-md-10 mx-auto">
            <!-- DISPLAY LOGIN FORM -->
          </div>
        </div>
      </div>
    </main>
</section>


{% include "footer.html" %}
